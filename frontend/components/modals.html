<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform transition-all">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                <iconify-icon icon="solar:trash-bin-minimalistic-bold" class="text-2xl text-red-600"></iconify-icon>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-zinc-900">Delete Document</h3>
                <p class="text-sm text-zinc-500">This action cannot be undone</p>
            </div>
        </div>
        
        <div class="mb-6 p-4 bg-zinc-50 rounded-lg border border-zinc-200">
            <p class="text-sm text-zinc-600 mb-1">You are about to delete:</p>
            <p id="deleteFileName" class="text-sm font-medium text-zinc-900 break-words"></p>
        </div>

        <div class="flex gap-3">
            <button onclick="Modals.closeDeleteModal()" class="flex-1 px-4 py-2.5 bg-zinc-100 text-zinc-700 rounded-lg font-medium hover:bg-zinc-200 transition-colors">
                Cancel
            </button>
            <button onclick="Modals.confirmDelete()" class="flex-1 px-4 py-2.5 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">
                Delete
            </button>
        </div>
    </div>
</div>

<!-- Rename Modal -->
<div id="renameModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform transition-all">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                <iconify-icon icon="solar:pen-bold" class="text-2xl text-blue-600"></iconify-icon>
            </div>
            <div>
                <h3 class="text-lg font-semibold text-zinc-900">Rename Document</h3>
                <p class="text-sm text-zinc-500">Enter a new name for this file</p>
            </div>
        </div>
        
        <div class="mb-6">
            <label class="block text-sm font-medium text-zinc-700 mb-2">Current name</label>
            <div class="p-3 bg-zinc-50 rounded-lg border border-zinc-200 mb-4">
                <p id="currentFileName" class="text-sm text-zinc-600 break-words"></p>
            </div>
            
            <label class="block text-sm font-medium text-zinc-700 mb-2">New name</label>
            <div class="relative">
                <input 
                    type="text" 
                    id="newFileName" 
                    class="w-full px-4 py-2.5 pr-12 border border-zinc-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="Enter new filename"
                >
                <span class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-zinc-400">.pdf</span>
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="Modals.closeRenameModal()" class="flex-1 px-4 py-2.5 bg-zinc-100 text-zinc-700 rounded-lg font-medium hover:bg-zinc-200 transition-colors">
                Cancel
            </button>
            <button onclick="Modals.confirmRename()" class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
                Rename
            </button>
        </div>
    </div>
</div>

<!-- Error Modal -->
<div id="errorModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform transition-all">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                <iconify-icon icon="solar:danger-circle-bold" class="text-2xl text-red-600"></iconify-icon>
            </div>
            <div>
                <h3 id="errorTitle" class="text-lg font-semibold text-zinc-900">Error</h3>
                <p class="text-sm text-zinc-500">Something went wrong</p>
            </div>
        </div>
        
        <div class="mb-6 p-4 bg-red-50 rounded-lg border border-red-200">
            <p id="errorMessage" class="text-sm text-red-900"></p>
        </div>

        <button onclick="Modals.closeErrorModal()" class="w-full px-4 py-2.5 bg-zinc-900 text-white rounded-lg font-medium hover:bg-zinc-800 transition-colors">
            Close
        </button>
    </div>
</div>

<!-- Success Toast -->
<div id="successToast" class="hidden fixed top-4 right-4 bg-white rounded-lg shadow-lg border border-zinc-200 p-4 z-50 transform transition-all">
    <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center">
            <iconify-icon icon="solar:check-circle-bold" class="text-lg text-green-600"></iconify-icon>
        </div>
        <p id="successMessage" class="text-sm font-medium text-zinc-900"></p>
    </div>
</div>
