<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Miro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 antialiased">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">
            
            <!-- Logo and Title -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-zinc-900 text-white rounded-2xl text-2xl font-bold mb-4 shadow-lg">
                    M
                </div>
                <h1 class="text-3xl font-bold text-zinc-900 mb-2">Welcome to Miro</h1>
                <p class="text-zinc-600">Your AI Learning Companion</p>
            </div>

            <!-- Login Card -->
            <div class="bg-white rounded-2xl shadow-lg border border-zinc-200 p-8">
                <h2 class="text-xl font-semibold text-zinc-900 mb-6 text-center">Teacher Login</h2>
                
                <!-- Google Sign In Button Container -->
                <div class="flex justify-center mb-6">
                    <div id="googleButtonContainer">
                        <!-- Button will be rendered here after config loads -->
                    </div>
                </div>

                <div class="text-center text-sm text-zinc-500">
                    <p>Sign in with your school Google account</p>
                </div>
            </div>

            <!-- Info Section -->
            <div class="mt-6 text-center text-sm text-zinc-500">
                <p>For teachers and administrators only</p>
                <p class="mt-2">Need help? Contact your school IT administrator</p>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="hidden fixed top-4 right-4 bg-white rounded-lg shadow-lg border border-red-200 p-4 z-50 max-w-md">
        <div class="flex items-start gap-3">
            <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <div class="flex-1">
                <p class="text-sm font-medium text-zinc-900 mb-1">Authentication Failed</p>
                <p id="errorMessage" class="text-sm text-zinc-600"></p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Load Google Client ID from backend
        async function loadConfig() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/config`);
                const config = await response.json();
                
                if (!config.google_client_id) {
                    throw new Error('Google Client ID not configured on server');
                }
                
                // Initialize Google Sign-In with the client ID
                if (window.google && window.google.accounts) {
                    google.accounts.id.initialize({
                        client_id: config.google_client_id,
                        callback: handleCredentialResponse
                    });
                    
                    // Render the button
                    google.accounts.id.renderButton(
                        document.getElementById('googleButtonContainer'),
                        { 
                            theme: 'outline', 
                            size: 'large', 
                            width: 300,
                            text: 'sign_in_with',
                            shape: 'rectangular',
                            logo_alignment: 'left'
                        }
                    );
                } else {
                    throw new Error('Google Sign-In library not loaded');
                }
            } catch (error) {
                console.error('Failed to load config:', error);
                showError('Failed to load authentication configuration: ' + error.message);
            }
        }

        // Handle Google Sign-In response
        async function handleCredentialResponse(response) {
            try {
                // Send the credential to your backend
                const result = await fetch(`${CONFIG.API_BASE_URL}/api/auth/google`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        credential: response.credential
                    })
                });

                const data = await result.json();

                if (!result.ok) {
                    throw new Error(data.detail || 'Authentication failed');
                }

                // Store the session token
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('user_email', data.email);
                localStorage.setItem('user_name', data.name);

                // Redirect to main app
                window.location.href = 'index.html';

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message);
            }
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorToast').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('errorToast').classList.add('hidden');
            }, 5000);
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                // Verify token is still valid
                fetch(`${CONFIG.API_BASE_URL}/api/auth/verify`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(response => {
                    if (response.ok) {
                        window.location.href = 'index.html';
                    } else {
                        // Token invalid, clear storage and load config
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('user_email');
                        localStorage.removeItem('user_name');
                        loadConfig();
                    }
                })
                .catch(() => {
                    // Network error, clear storage and load config
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('user_email');
                    localStorage.removeItem('user_name');
                    loadConfig();
                });
            } else {
                // No token, load config to show login button
                loadConfig();
            }
        });
    </script>

</body>
</html>
